name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test with coverage
        if: matrix.node-version == 22
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "Missing ESM output" && exit 1)
          test -f dist/index.cjs || (echo "Missing CJS output" && exit 1)
          test -f dist/index.d.ts || (echo "Missing type declarations" && exit 1)
