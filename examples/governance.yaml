# governance.yaml — Main configuration file for @grwnd/pi-governance
#
# Place this file at one of the following paths (checked in order):
#   1. $PI_GOV_GOVERNANCE_CONFIG (environment variable)
#   2. .pi/governance.yaml (project-local)
#   3. ~/.pi/agent/governance.yaml (user-global)
#
# Environment variables can be referenced as ${VAR_NAME} and are resolved at load time.

# ── Authentication / Identity ──────────────────────────────────────────
auth:
  provider: env # Options: env, local, oidc
  env:
    user_var: PI_GOV_USER # Env var for user ID
    role_var: PI_GOV_ROLE # Env var for role
    org_unit_var: PI_GOV_ORG_UNIT # Env var for organizational unit
  # Uncomment to use file-based identity instead:
  # provider: local
  # local:
  #   users_file: ./users.yaml

# ── Policy Engine ──────────────────────────────────────────────────────
policy:
  engine: yaml # Options: yaml, oso
  yaml:
    rules_file: ./governance-rules.yaml
  # Uncomment to use Oso/Polar policy engine:
  # engine: oso
  # oso:
  #   polar_files:
  #     - ./policies/base.polar
  #     - ./policies/tools.polar

# ── Prompt Templates ───────────────────────────────────────────────────
templates:
  directory: ./templates/
  default: project-lead # Fallback template when role has none

# ── Human-in-the-Loop ─────────────────────────────────────────────────
hitl:
  default_mode: supervised # Options: autonomous, supervised, dry_run
  approval_channel: cli # Options: cli, webhook
  timeout_seconds: 300 # 5-minute approval timeout
  # Uncomment for webhook-based approvals:
  # approval_channel: webhook
  # webhook:
  #   url: https://approvals.example.com/api/v1/approve

# ── Audit Logging ─────────────────────────────────────────────────────
audit:
  sinks:
    - type: jsonl
      path: ~/.pi/agent/audit.jsonl # Local audit trail
    # Uncomment to add a webhook sink:
    # - type: webhook
    #   url: https://audit.example.com/api/v1/events

# ── Dependency Guardian ───────────────────────────────────────────────
# Validates package-install commands (npm, pip, cargo) against registry
# metadata, vulnerability databases, and typosquat detection.
# Disabled by default — enable to protect against slopsquatting attacks.
#
# dependency_guardian:
#   enabled: true
#   checks:
#     existence: true       # Verify the package exists on the registry
#     reputation: true      # Check age, download count, maintainer count
#     typosquatting: true   # Detect names similar to popular packages
#     install_scripts: true # Flag packages with install scripts
#     vulnerabilities: true # Query OSV.dev for known CVEs
#   risk_thresholds:
#     min_age_days: 30          # Packages newer than this → medium risk
#     min_weekly_downloads: 100 # Downloads below this → medium/high risk
#   on_risk: escalate  # escalate | block | audit
#   custom_registry_bypass: true  # Skip checks for --registry / --index-url
#   allowlist:            # Additional trusted packages (merged with defaults)
#     - my-internal-pkg
#   blocklist:            # Additional blocked packages (merged with defaults)
#     - known-bad-pkg
#   blocklist_patterns:   # Regex patterns for blocklisting
#     - '^evil-'

# ── Org-Unit Overrides (optional) ─────────────────────────────────────
# Override HITL or policy settings for specific organizational units.
# org_units:
#   compliance:
#     hitl:
#       default_mode: dry_run
#   platform:
#     hitl:
#       timeout_seconds: 600
